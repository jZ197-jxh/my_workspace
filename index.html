<style>
:root{--green:#9AB99C;--green-light:#B5CFBA;--green-bg:#f0f5f0;--card:#fff;--bg:#f5f7f3;--text:#333;--text2:#555;--text3:#888;--text4:#bbb;--border:#eee;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
.header{background:linear-gradient(135deg,var(--green),var(--green-light));padding:20px 16px 16px;color:#fff;display:flex;justify-content:space-between;align-items:flex-start;}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px;}
.header .motto{font-size:12px;opacity:.8;margin-top:4px;}
.header .date{text-align:right;font-size:13px;opacity:.9;}
.header .date small{font-size:11px;opacity:.7;display:block;margin-top:2px;}
.container{max-width:520px;margin:0 auto;padding:12px;}

/* 阶段条 */
.phase{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center;}
.phase .name{font-size:15px;font-weight:600;color:var(--green);}
.phase .days{font-size:12px;color:var(--text3);}

/* 统计 */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.stat{background:var(--card);border-radius:10px;padding:12px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.stat .num{font-size:22px;font-weight:700;color:var(--green);}
.stat .desc{font-size:11px;color:var(--text3);margin-top:2px;}

/* 卡片 */
.card{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:10px;}
.card-hd{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.card-hd h2{font-size:15px;font-weight:600;}
.card-hd .hint{font-size:12px;color:var(--text3);}
.card-bd{padding:10px 14px 14px;}

/* 任务项 */
.step{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-radius:8px;margin-bottom:2px;cursor:pointer;transition:background .15s;-webkit-user-select:none;user-select:none;}
.step:active{background:#f0f0f0;}
.chk{width:22px;height:22px;border:2px solid #d0d0d0;border-radius:50%;flex-shrink:0;margin-top:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.step.done .chk{background:var(--green);border-color:var(--green);}
.step.done .chk::after{content:"✓";color:#fff;font-size:12px;font-weight:700;}
.step.done .stxt{color:var(--text4);text-decoration:line-through;}
.stxt{font-size:13.5px;line-height:1.55;flex:1;}
.stxt .sub{font-size:12px;color:var(--text3);display:block;margin-top:2px;}

.sec-title{font-size:12px;font-weight:600;color:var(--text3);padding:8px 8px 4px;margin-top:6px;text-transform:uppercase;letter-spacing:.5px;}
.sec-title:first-child{margin-top:0;}

/* 本周概览 */
.week-list{font-size:12.5px;line-height:1.85;color:var(--text2);padding-left:4px;}
.week-list .today{background:var(--green-bg);border-radius:6px;padding:2px 6px;margin:0 -6px;}
.week-list .today strong{color:var(--green);}

/* 进度条 */
.prog{padding:8px 0;}
.prog-label{font-size:12px;color:var(--text3);margin-bottom:4px;}
.prog-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;}
.prog-bar .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--green-light));transition:width .4s;}
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:3px;}

/* 体重 */
.weight-row{display:flex;gap:8px;align-items:center;padding:4px 0;}
.weight-row input{flex:1;padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border .2s;}
.weight-row input:focus{border-color:var(--green);}
.weight-row button{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;}
.weight-log{font-size:11px;color:var(--text3);margin-top:6px;max-height:80px;overflow-y:auto;}

.footer{text-align:center;padding:20px 0;color:#ccc;font-size:11px;}

/* 滚动条 */
::-webkit-scrollbar{width:0;height:0;}

/* tab */
.tabs{display:flex;gap:0;margin-bottom:10px;background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.tab{flex:1;text-align:center;padding:10px 0;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;}
.tab.active{color:var(--green);border-bottom-color:var(--green);background:var(--green-bg);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* 阅读 */
.book-row{padding:6px 0;}
.book-label{font-size:12px;color:var(--text3);margin-bottom:5px;}
.books{display:flex;flex-wrap:wrap;gap:5px;}
.book{font-size:11px;padding:3px 8px;border-radius:6px;background:#f0f0f0;color:#666;}
.book.cur{background:#e6f7ff;color:#1890ff;border:1px solid #1890ff;}
.book.ok{background:var(--green-bg);color:var(--green);text-decoration:line-through;}
</style>

  <div class="tabs">

    <div class="tab" onclick="switchTab('week')">本周概览</div>
    <div class="tab" onclick="switchTab('progress')">总进度</div>
  </div>

  <div class="tab-content active" id="tc-today">

  </div>

  </div>

  <!-- 总进度 -->
  <div class="tab-content" id="tc-progress">
    <div class="card">
      <div class="card-hd"><h2>📚 文学史进度</h2><span class="hint">3册约40章</span></div>
      <div class="card-bd" id="litProgress"></div>
    </div>
    <div class="card">
      <div class="card-hd"><h2>🎧 六级听力</h2><span class="hint">6套真题</span></div>
      <div class="card-bd">
        <div class="prog">

          <div class="prog-info"><span id="listenInfo">0/6 套</span><span>基线98 → 目标120+</span></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><h2>📕 阅读进度</h2></div>
      <div class="card-bd">
        <div class="book-row"><div class="book-label">当前 · 川端康成合集</div><div class="books"><span class="book">母亲的初恋</span><span class="book">水月</span><span class="book">千羽鹤</span></div></div>
        <div class="book-row"><div class="book-label">接下来</div><div class="books"><span class="book">众神的样子</span><span class="book">众神的战争</span><span class="book">蛇结</span><span class="book">赫索格</span></div></div>
        <div class="book-row"><div class="book-label">冲刺 · 阿加莎·波洛系列</div><div class="books"><span class="book">斯泰尔斯庄园奇案</span><span class="book">首相绑架案</span><span class="book">高尔夫球场命案</span><span class="book" style="color:#bbb">…共39本</span></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><h2>🏃 体态矫正</h2><span class="hint">欧阳春晓</span></div>
      <div class="card-bd" id="exerciseProgress"></div>
    </div>
    <div class="card">

      <div class="card-bd">

        <div class="weight-log" id="weightLog"></div>
      </div>
    </div>
  </div>
</div>

<div class="footer">🫛 豌豆工作台 · 数据保存在本地</div>

// ========== 工具函数 ==========
const LS_PREFIX='dw_';
function lsKey(k){return LS_PREFIX+k;}
function lsGet(k,d){try{const v=localStorage.getItem(lsKey(k));return v?JSON.parse(v):d;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(lsKey(k),JSON.stringify(v));}catch(e){}}

function getDayNum(){
  const now=new Date();
  const shifted=new Date(now.getTime()-5*3600000);
  const start=new Date(START);
  start.setHours(5,0,0,0);
  const diff=Math.floor((shifted-start)/(86400000))+1;
  if(diff<1)return 1;
  if(diff>40)return 40;
  return diff;
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tc-'+t).classList.add('active');
}

// ========== 渲染 ==========
function renderToday(){
  // 一次性修复：D1因边界调整丢失完成记录，仅补全D1
  if(getDayNum()>=2){
    const d1=lsGet('done_1',[]);
    if(d1.length===0 && PLAN[1]){
      lsSet('done_1',PLAN[1].tasks.map((_,idx)=>idx));
    }
  }
  const d=getDayNum();
  const info=PLAN[d];
  if(!info)return;
  document.getElementById('todayTitle').textContent='📌 D'+d+' · '+info.date+' '+info.wd;
  document.getElementById('todayHint').textContent=info.hint||'';

  const done=lsGet('done_'+d,[]);
  const coDone=lsGet('co_done_'+d,[]);
  const bd=document.getElementById('todayTasks');
  bd.innerHTML='';

  // 渲染当天任务
  info.tasks.forEach((t,i)=>{
    const div=document.createElement('div');
    div.className='step'+(done.includes(i)?' done':'');
    div.innerHTML='<div class="chk"></div><div class="stxt">'+(t.cat?t.cat+' ':'')+t.t+(t.s?'<span class="sub">'+t.s+'</span>':'')+'</div>';
    div.onclick=function(){toggleTask(d,i,this);};
    bd.appendChild(div);
  });

  // 自动顺延：收集之前所有天未完成的
  // 通过任务内容匹配判断是否已在当天完成（处理边界调整导致的key错位）
  const todayDone=lsGet('done_'+d,[]);
  const todayTaskKeys=info.tasks.map(t=>t.t);
  const todayDoneKeys=todayDone.map(i=>todayTaskKeys[i]||'');
  let carryOvers=[];
  for(let prev=1;prev<d;prev++){
    const pInfo=PLAN[prev];
    if(!pInfo)continue;
    const prevDone=lsGet('done_'+prev,[]);
    if(prevDone.length>=pInfo.tasks.length)continue; // 前一天全部完成，跳过
    pInfo.tasks.forEach((t,idx)=>{
      if(!prevDone.includes(idx)){
        // 检查该任务是否已在今天的完成列表中（内容匹配）
        if(todayDoneKeys.includes(t.t))return;
        carryOvers.push({task:t,fromDay:prev,idx:idx});
      }
    });
  }

  if(carryOvers.length>0){
    const secDiv=document.createElement('div');
    secDiv.className='sec-title';
    secDiv.textContent='📦 延期任务（'+carryOvers.length+'项）';
    bd.appendChild(secDiv);
    carryOvers.forEach((co,ci)=>{
      const div=document.createElement('div');
      const key=co.fromDay+'_'+co.idx;
      div.className='step'+(coDone.includes(key)?' done':'');
      const t=co.task;
      div.innerHTML='<div class="chk"></div><div class="stxt">'+(t.cat?t.cat+' ':'')+'<span style="color:#e09015;font-size:11px;font-weight:600;">延期 </span>'+t.t+(t.s?'<span class="sub">'+t.s+'</span>':'')+'</div>';
      div.onclick=function(){toggleCoTask(d,key,this);};
      bd.appendChild(div);
    });
  }

  // 统计
  const total=info.tasks.length+carryOvers.length;
  const doneN=done.length+coDone.length;
  document.getElementById('sToday').textContent=doneN+'/'+total;

  // 总进度
  let allDone=0,allTotal=0;
  for(let i=1;i<=40;i++){
    allTotal+=PLAN[i].tasks.length;
    allDone+=lsGet('done_'+i,[]).length;
    allDone+=lsGet('co_done_'+i,[]).length;
  }
  document.getElementById('sTotal').textContent=Math.round(allDone/allTotal*100)+'%';

  // 连续打卡
  let streak=0;
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=d;i>=1;i--){
    const dd=lsGet('done_'+i,[]);
    const co=lsGet('co_done_'+i,[]);
    if(dd.length>0||co.length>0){streak++;}else{break;}
  }
  if(streak===0){
    for(let i=d+1;i<=40;i++){
      const dd=lsGet('done_'+i,[]);
      const co=lsGet('co_done_'+i,[]);
      if(dd.length>0||co.length>0){streak++;}else{break;}
    }
  }
  document.getElementById('sStreak').textContent=streak;
}

function toggleTask(day,idx,el){
  const done=lsGet('done_'+day,[]);
  const p=done.indexOf(idx);
  if(p>=0){done.splice(p,1);el.classList.remove('done');}
  else{done.push(idx);el.classList.add('done');}
  lsSet('done_'+day,done);
  refreshStats(day);
}

function toggleCoTask(day,key,el){
  const coDone=lsGet('co_done_'+day,[]);
  const p=coDone.indexOf(key);
  if(p>=0){coDone.splice(p,1);el.classList.remove('done');}
  else{coDone.push(key);el.classList.add('done');}
  lsSet('co_done_'+day,coDone);
  refreshStats(day);
}

function refreshStats(day){
  const d=getDayNum();
  const info=PLAN[day];
  // 计算延期任务数（与renderToday保持一致的内容匹配逻辑）
  const todayDone=lsGet('done_'+d,[]);
  const todayTaskKeys=info.tasks.map(t=>t.t);
  const todayDoneKeys=todayDone.map(i=>todayTaskKeys[i]||'');
  let coTotal=0;
  for(let prev=1;prev<day;prev++){
    const pInfo=PLAN[prev];
    if(!pInfo)continue;
    const prevDone=lsGet('done_'+prev,[]);
    if(prevDone.length>=pInfo.tasks.length)continue;
    pInfo.tasks.forEach((t,idx)=>{
      if(!prevDone.includes(idx)){
        if(todayDoneKeys.includes(t.t))return;
        coTotal++;
      }
    });
  }
  const done=lsGet('done_'+day,[]);
  const coDone=lsGet('co_done_'+day,[]);
  const total=info.tasks.length+coTotal;
  const doneN=done.length+coDone.length;
  document.getElementById('sToday').textContent=doneN+'/'+total;
  let allDone=0,allTotal=0;
  for(let i=1;i<=40;i++){
    allTotal+=PLAN[i].tasks.length;
    allDone+=lsGet('done_'+i,[]).length;
    allDone+=lsGet('co_done_'+i,[]).length;
  }
  document.getElementById('sTotal').textContent=Math.round(allDone/allTotal*100)+'%';
  // 更新连续打卡
  let streak=0;
  for(let i=d;i>=1;i--){
    const dd=lsGet('done_'+i,[]);
    const co=lsGet('co_done_'+i,[]);
    if(dd.length>0||co.length>0){streak++;}else{break;}
  }
  if(streak===0){
    for(let i=d+1;i<=40;i++){
      const dd=lsGet('done_'+i,[]);
      const co=lsGet('co_done_'+i,[]);
      if(dd.length>0||co.length>0){streak++;}else{break;}
    }
  }
  document.getElementById('sStreak').textContent=streak;
}

function renderWeek(){
  const d=getDayNum();
  // 找到本周：周一到下周日
  const today=new Date();
  const dow=today.getDay()||7; // 周一=1
  const mon=new Date(today);mon.setDate(today.getDate()-(dow-1));
  const weekDays=[];
  for(let i=0;i<7;i++){
    const dt=new Date(mon);dt.setDate(mon.getDate()+i);
    const shifted_dt=new Date(dt.getTime()+5*3600000);
    const dn=Math.floor((shifted_dt-START)/86400000)+1;
    if(dn>=1&&dn<=40)weekDays.push(dn);
  }
  if(weekDays.length===0){document.getElementById('weekList').innerHTML='<div style="color:#aaa">当前不在计划范围内</div>';return;}

  const first=PLAN[weekDays[0]],last=PLAN[weekDays[weekDays.length-1]];
  document.getElementById('weekRange').textContent=first.date+'-'+last.date;

  const cur=getDayNum();
  let html='';
  weekDays.forEach(dn=>{
    const info=PLAN[dn];
    if(!info)return;
    const isToday=dn===cur;
    const tasks=info.tasks.map(t=>t.cat+' '+t.t).join(' ｜ ');
    html+='<div'+(isToday?' class="today"':'')+'><strong>D'+dn+' '+info.wd+(isToday?' ← 今天':'')+'</strong> '+tasks+'</div>';
  });
  document.getElementById('weekList').innerHTML=html;
}

function renderProgress(){
  // 文学史进度
  const chapters=[
    {name:'上册·先秦文学',total:6,done:0},
    {name:'上册·秦汉文学',total:7,done:0},
    {name:'中册·魏晋南北朝',total:7,done:0},
    {name:'中册·隋唐五代',total:7,done:0},
    {name:'下册·宋代文学',total:7,done:0},
    {name:'下册·元明清近代',total:6,done:0}
  ];
  // 根据已完成的D号估算
  const d=getDayNum();
  // 先秦D2-D6(5天,6章) → 秦汉D7复习+D8-D14
  // 简化：按阶段估算进度
  const litDays=[
    {range:[2,6],ch:0},   // 先秦
    {range:[7,7],ch:0},   // 先秦复习
    {range:[8,14],ch:1},  // 秦汉
    {range:[15,21],ch:2}, // 魏晋
    {range:[22,28],ch:3}, // 隋唐
    {range:[29,35],ch:4}, // 宋代
    {range:[36,40],ch:5}  // 元明清
  ];
  litDays.forEach(l=>{
    let done=0;
    for(let i=l.range[0];i<=l.range[1];i++){
      if(i<=d){
        const dd=lsGet('done_'+i,[]);
        if(dd.length>0)done++;
      }
    }
    chapters[l.ch].done=Math.min(done,chapters[l.ch].total);
  });
  // 复习日算入上一阶段
  chapters[0].done=Math.min(chapters[0].done,6);

  let litHtml='';
  chapters.forEach(c=>{
    const pct=Math.round(c.done/c.total*100);
    litHtml+='<div class="prog"><div class="prog-label">'+c.name+'</div><div class="prog-bar"><div class="fill" style="width:'+pct+'%"></div></div><div class="prog-info"><span>'+c.done+'/'+c.total+' 章</span><span>'+pct+'%</span></div></div>';
  });
  document.getElementById('litProgress').innerHTML=litHtml;

  // 听力进度
  const listenSets=[[2,8],[9,15],[16,22],[23,29],[30,36]];
  let setsDone=0;
  listenSets.forEach(s=>{
    let allDone=true;
    for(let i=s[0];i<=s[1];i++){
      if(i>40||i<d){const dd=lsGet('done_'+i,[]);if(dd.length===0)allDone=false;}
      else allDone=false;
    }
    if(allDone&&d>=s[1])setsDone++;
  });
  document.getElementById('listenFill').style.width=Math.round(setsDone/6*100)+'%';
  document.getElementById('listenInfo').textContent=setsDone+'/6 套';

  // 体重记录
  renderWeight();
}

// ========== 体重记录 ==========
function renderWeight(){
  const logs=lsGet('weights',[]);
  const el=document.getElementById('weightLog');
  if(logs.length===0){el.textContent='还没有记录';return;}
  el.innerHTML=logs.slice().reverse().map(l=>'<div>'+l.date+'：'+l.val+'斤</div>').join('');
}
function saveWeight(){
  const input=document.getElementById('weightInput');
  const val=input.value.trim();
  if(!val)return;
  const logs=lsGet('weights',[]);
  const now=new Date();
  logs.push({date:(now.getMonth()+1)+'.'+now.getDate(),val:val});
  lsSet('weights',logs);
  input.value='';
  renderWeight();
}

// ========== 时间 ==========
function updateTime(){
  const now=new Date();
  const days=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  const y=now.getFullYear(),m=now.getMonth()+1,d=now.getDate();
  const h=String(now.getHours()).padStart(2,'0'),min=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('curDate').textContent=y+'年'+m+'月'+d+'日 '+days[now.getDay()];
  document.getElementById('curTime').textContent=h+':'+min;
}

// ========== 阶段条 ==========
function renderPhase(){
  const d=getDayNum();
  const info=PLAN[d];
  if(!info)return;
  document.getElementById('phaseName').textContent=info.phase;
  document.getElementById('phaseDays').textContent=info.date+' · D'+d;
}

// ========== 自动刷新：检测日切换并重新渲染 ==========
let currentDayNum = getDayNum();

function renderAll(){
  renderPhase();
  renderToday();
  renderWeek();
  renderProgress();
}

function checkDayChange(){
  const newDay = getDayNum();
  if(newDay !== currentDayNum){
    currentDayNum = newDay;
    renderAll();
  }
}

// ========== 初始化 ==========
updateTime();
setInterval(updateTime, 60000);
setInterval(checkDayChange, 5 * 60 * 1000); // 每5分钟检测一次日切换
renderAll();
